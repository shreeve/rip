# Every .rip file in this repository — the grammar sources included —
# compiles through the repository's own loader.
preload = ["./src/loader.js"]

[test]
preload = ["./src/loader.js"]

# The test boundary: package suites run from their own directories
# (rip test.rip; the vscode extension has its own CI step), and misc/
# is an untracked scratch area — root runs exclude both mechanically.
pathIgnorePatterns = ["packages/**", "misc/**"]

# The per-test timeout lives in package.json's test script as a CLI
# flag (`bun test --timeout 15000`): Bun ignores a bunfig [test]
# timeout key — a key here would be dead config.

# Workspace packages must land in node_modules/@rip-lang/* so in-tree
# imports resolve here instead of falling through to ~/node_modules
# (which may still point at a sibling rip-lang checkout).
[install]
linker = "hoisted"
