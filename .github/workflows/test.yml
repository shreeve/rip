# CI — the full suite on every push and pull request to main.
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun (pinned — the browser bundle is byte-gated against this exact toolchain)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install TypeScript as an external tool (pinned; never a repository dependency)
        run: npm install -g typescript@7.0.2

      - name: Install UI package dependencies (isolated exact budget)
        working-directory: packages/ui
        run: bun install --frozen-lockfile

      - name: Full suite, extended tier included
        run: bun run test:all

      - name: Parser regeneration — must be byte-identical to the committed file
        run: |
          bun run parser
          git diff --exit-code src/parser.js

      - name: Corpus snapshots — must be byte-identical to the committed artifacts
        run: |
          bun run corpus-expected
          git diff --exit-code test/corpus/expected

      - name: Browser bundle — must be byte-identical to the committed artifact
        run: |
          bun run browser-bundle
          git diff --exit-code dist/browser

      - name: Extension suite (packages/vscode — its own suite, its own boundary)
        working-directory: packages/vscode
        run: |
          bun install --frozen-lockfile
          bun run test

      - name: UI package suite (packages/ui — its own suite, its own boundary)
        working-directory: packages/ui
        run: bun run test

      - name: App package suite (packages/app — its own suite, its own boundary)
        working-directory: packages/app
        run: bun run test

      - name: Validate package suite (packages/validate — its own suite, its own boundary)
        working-directory: packages/validate
        run: bun run test

      - name: Server package suite (packages/server — its own suite, its own boundary)
        working-directory: packages/server
        run: bun run test

      - name: Database package suite (packages/db — protocol tests; live tests gated on a harbor endpoint)
        working-directory: packages/db
        run: bun run test

      - name: Time package suite (packages/time — its own suite, its own boundary; dayjs is the parity oracle)
        working-directory: packages/time
        run: |
          bun install --frozen-lockfile
          bun run test

      - name: Real-browser suite (packages/browser-tests — Playwright in Chromium/Firefox/WebKit)
        working-directory: packages/browser-tests
        run: |
          bun install --frozen-lockfile
          bunx playwright install --with-deps
          bun run test
