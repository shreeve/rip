# CI — the full suite on every push and pull request to main.
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Full suite
        run: bun run test

      - name: Parser regeneration — must be byte-identical to the committed file
        run: |
          bun run parser
          git diff --exit-code src/parser.js

      - name: Corpus snapshots — must be byte-identical to the committed artifacts
        run: |
          bun run corpus-expected
          git diff --exit-code test/corpus/expected
